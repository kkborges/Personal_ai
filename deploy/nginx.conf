    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     
    #     location / {
    #         proxy_pass http://personal_ai_backend;
    #         # ... mesmo conteúdo do bloco acima
    #     }
    # }
}
