# Nginx — Personal AI Mobile (reverse proxy + WebSocket + SSL)
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    
    # Gzip para melhor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_comp_level 6;
    
    upstream personal_ai_backend {
        server app:8765;
        keepalive 32;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Redireciona para HTTPS se SSL configurado
        # return 301 https://$host$request_uri;
        
        # Ou serve direto (sem SSL)
        location / {
            proxy_pass http://personal_ai_backend;
            proxy_http_version 1.1;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            
            # Desabilita buffer para streaming
            proxy_buffering off;
            proxy_cache off;
        }
        
        # Cache de assets estáticos
        location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
            proxy_pass http://personal_ai_backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Servidor HTTPS (descomente e configure após obter certificado)
    # server {
    #     listen 443 ssl http2;
    #     server_name seudominio.com.br;
    #     
